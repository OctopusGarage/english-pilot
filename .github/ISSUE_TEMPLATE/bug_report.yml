name: Bug Report
description: Something is not working as expected
labels: ['needs-triage']
body:
  - type: markdown
    attributes:
      value: 'Please include enough detail to reproduce the problem without private credentials.'
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Claude Code hook
        - Codex hook
        - MCP
        - CLI
        - Feishu/Lark long connection
        - WeChat long connection
        - daemon/service
        - other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: 'Example: macOS 15.5, Ubuntu 24.04'
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: 'Run: node -v'
      placeholder: 'v24.x.x'
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or diagnostics
      description: 'Paste sanitized output from `english-pilot doctor --json`, `english-pilot daemon status --json`, or service logs.'
      render: shell
