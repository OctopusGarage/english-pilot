name: Feature Request
description: Suggest an improvement or new feature
labels: ['needs-triage']
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem are you trying to solve?
      placeholder: "I'm trying to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: What would you like EnglishPilot to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or tools you considered.
