name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Build package artifact
        run: |
          set -euo pipefail
          npm ci
          npm run verify
          mkdir -p dist-release
          PACKED="$(npm pack --pack-destination dist-release --silent | tail -n 1)"
          mv "dist-release/${PACKED}" "dist-release/english-pilot-${GITHUB_REF_NAME}.tgz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="OctopusGarage/english-pilot"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          ARTIFACT="dist-release/english-pilot-${TAG}.tgz"

          {
            echo "## Changes"
            echo
            if [ -n "$PREV" ]; then
              git log --no-merges --pretty='- %s' "${PREV}..${TAG}" | grep -v '^- release:' || true
            else
              git log --no-merges --pretty='- %s' "${TAG}" | grep -v '^- release:' || true
            fi
            echo
            echo "## Install"
            echo
            echo "Install or update with the packaged installer:"
            echo
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh | bash"
            echo '```'
            echo
            echo "Pin this release:"
            echo
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh | \\"
            echo "  ENGLISH_PILOT_VERSION=${TAG} bash"
            echo '```'
            echo
            echo "Or install from npm after the npm publish workflow has run:"
            echo
            echo '```bash'
            echo "npm install -g english-pilot"
            echo "english-pilot setup --yes"
            echo '```'
            echo
            echo "Next:"
            echo
            echo '```bash'
            echo "english-pilot wechat setup"
            echo "english-pilot service install"
            echo '```'
            echo
            echo "AI assistant prompt:"
            echo
            echo '```text'
            echo "Install or update EnglishPilot from this release, run english-pilot setup --yes, then show me the next WeChat/service commands."
            echo '```'
            echo
            echo "## Verify the signature"
            echo
            echo '```bash'
            echo "cosign verify-blob english-pilot-${TAG}.tgz \\"
            echo "  --bundle english-pilot-${TAG}.tgz.cosign.bundle \\"
            echo "  --certificate-identity-regexp 'https://github.com/${REPO}/.github/workflows/release.yml@.*' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
            if [ -n "$PREV" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV}...${TAG}"
            fi
          } > release-notes.md

          gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          gh release upload "$TAG" "$ARTIFACT"

          cosign sign-blob --yes "$ARTIFACT" \
            --bundle "${ARTIFACT}.cosign.bundle"
          gh release upload "$TAG" "${ARTIFACT}.cosign.bundle"
