name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - access-public
      ref:
        description: 'Tag or ref to publish (blank = default branch)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - run: npm ci
      - if: ${{ github.event.inputs.operation == 'publish' }}
        run: npm run verify
      - if: ${{ github.event.inputs.operation == 'publish' }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: ${{ github.event.inputs.operation == 'access-public' }}
        run: npm access set status=public @octopusgarage/english-pilot
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
